<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI','Hiragino Kaku Gothic ProN','Yu Gothic UI','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Header -->
  <text x="64" y="86" font-size="52" font-weight="800" fill="#ffffff">ShotTTL</text>
  <rect x="300" y="55" width="232" height="38" rx="19" fill="url(#accent)" opacity="0.18"/>
  <text x="416" y="81" font-size="20" font-weight="600" fill="#a5b4fc" text-anchor="middle">Give screenshots a TTL</text>
  <text x="64" y="122" font-size="24" font-weight="500" fill="#cbd5e1">スクリーンショットに寿命をつけて、フォルダを勝手にキレイに保つ</text>

  <!-- BEFORE card -->
  <g filter="url(#shadow)">
    <rect x="64" y="168" width="392" height="376" rx="22" fill="url(#card)"/>
  </g>
  <text x="88" y="208" font-size="22" font-weight="700" fill="#0f172a">📁 Screenshots</text>
  <rect x="300" y="188" width="132" height="28" rx="14" fill="#fee2e2"/>
  <text x="366" y="207" font-size="15" font-weight="700" fill="#dc2626" text-anchor="middle">散らかってる…</text>
  <!-- cluttered thumbnails 3x3 -->
  <g>
    <rect x="92"  y="232" width="108" height="78" rx="10" fill="#fca5a5"/>
    <rect x="214" y="232" width="108" height="78" rx="10" fill="#fdba74"/>
    <rect x="336" y="232" width="108" height="78" rx="10" fill="#fcd34d"/>
    <rect x="92"  y="322" width="108" height="78" rx="10" fill="#fdba74"/>
    <rect x="214" y="322" width="108" height="78" rx="10" fill="#a5b4fc"/>
    <rect x="336" y="322" width="108" height="78" rx="10" fill="#fca5a5"/>
    <rect x="92"  y="412" width="108" height="78" rx="10" fill="#fcd34d"/>
    <rect x="214" y="412" width="108" height="78" rx="10" fill="#fca5a5"/>
    <rect x="336" y="412" width="108" height="78" rx="10" fill="#fdba74"/>
  </g>
  <text x="92" y="524" font-size="17" font-weight="600" fill="#64748b">132 枚 ・ 480 MB</text>

  <!-- Center flow -->
  <g>
    <!-- command chip -->
    <rect x="492" y="232" width="296" height="120" rx="18" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="514" cy="258" r="5" fill="#f87171"/>
    <circle cx="530" cy="258" r="5" fill="#fbbf24"/>
    <circle cx="546" cy="258" r="5" fill="#34d399"/>
    <text x="512" y="298" font-size="17" font-family="'Cascadia Code','Consolas',monospace" fill="#22d3ee">$ shotttl</text>
    <text x="512" y="324" font-size="15" font-family="'Cascadia Code','Consolas',monospace" fill="#94a3b8">  --keep 1h</text>

    <text x="640" y="200" font-size="22" font-weight="800" fill="url(#accent)" text-anchor="middle">ShotTTL</text>

    <!-- arrow -->
    <g>
      <line x1="500" y1="412" x2="772" y2="412" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
      <path d="M772 412 L748 396 L748 428 Z" fill="#22d3ee"/>
    </g>
    <text x="640" y="400" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle">古い画像だけ自動でお片付け</text>
    <text x="640" y="448" font-size="15" font-weight="600" fill="#94a3b8" text-anchor="middle">毎時バックグラウンド実行・黒い画面は出ない</text>
  </g>

  <!-- AFTER card -->
  <g filter="url(#shadow)">
    <rect x="824" y="168" width="392" height="376" rx="22" fill="url(#card)"/>
  </g>
  <text x="848" y="208" font-size="22" font-weight="700" fill="#0f172a">📁 Screenshots</text>
  <rect x="1060" y="188" width="132" height="28" rx="14" fill="#dcfce7"/>
  <text x="1126" y="207" font-size="15" font-weight="700" fill="#16a34a" text-anchor="middle">スッキリ ✓</text>
  <!-- recent thumbnails -->
  <g>
    <rect x="852"  y="232" width="108" height="78" rx="10" fill="#86efac"/>
    <rect x="974"  y="232" width="108" height="78" rx="10" fill="#7dd3fc"/>
    <rect x="1096" y="232" width="108" height="78" rx="10" fill="#a5b4fc"/>
  </g>
  <text x="852" y="296" font-size="13" font-weight="700" fill="#065f46" opacity="0.0">.</text>
  <!-- trash for old ones -->
  <g transform="translate(852,346)">
    <rect x="0" y="0" width="332" height="150" rx="14" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="166" y="34" font-size="15" font-weight="700" fill="#64748b" text-anchor="middle">古いものはゴミ箱へ（復元できる）</text>
    <!-- trash bin icon -->
    <g transform="translate(146,52)">
      <rect x="6" y="14" width="28" height="34" rx="4" fill="#94a3b8"/>
      <rect x="2" y="6" width="36" height="8" rx="4" fill="#64748b"/>
      <rect x="14" y="0" width="12" height="6" rx="3" fill="#64748b"/>
      <line x1="14" y1="22" x2="14" y2="42" stroke="#e2e8f0" stroke-width="2"/>
      <line x1="20" y1="22" x2="20" y2="42" stroke="#e2e8f0" stroke-width="2"/>
      <line x1="26" y1="22" x2="26" y2="42" stroke="#e2e8f0" stroke-width="2"/>
    </g>
  </g>
  <text x="848" y="524" font-size="17" font-weight="600" fill="#16a34a">直近1時間の 3 枚だけ残る</text>

  <!-- Bottom value props -->
  <g font-size="19" font-weight="700" fill="#e2e8f0">
    <rect x="64" y="596" width="368" height="72" rx="16" fill="#1e293b"/>
    <text x="92" y="640" fill="#7dd3fc">🖥  黒いターミナルが出ない</text>

    <rect x="456" y="596" width="368" height="72" rx="16" fill="#1e293b"/>
    <text x="484" y="640" fill="#86efac">🗑  既定はゴミ箱で安全</text>

    <rect x="848" y="596" width="368" height="72" rx="16" fill="#1e293b"/>
    <text x="876" y="640" fill="#c4b5fd">💻  Windows / macOS / Linux</text>
  </g>
</svg>
